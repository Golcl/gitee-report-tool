<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 深色圆角背景 -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#bgGrad)"/>
  <!-- 主星 -->
  <path d="M16 5l3.09 6.26L26 12.27l-5 4.87 1.18 6.88L16 20.5l-6.18 3.52L11 17.14l-5-4.87 6.91-1.01L16 5z" fill="url(#starGrad)" filter="url(#glow)"/>
  <!-- 小星星装饰 -->
  <circle cx="9" cy="9" r="1" fill="#FACC15" opacity="0.4"/>
  <circle cx="23" cy="8" r="0.7" fill="#FACC15" opacity="0.3"/>
  <circle cx="25" cy="22" r="0.8" fill="#FACC15" opacity="0.35"/>
  <circle cx="7" cy="23" r="0.6" fill="#FACC15" opacity="0.25"/>
</svg>
